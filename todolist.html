<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>

<style>
body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #43cea2, #185a9d);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
margin: 0;
}

.container {
background: white;
padding: 30px;
border-radius: 12px;
width: 350px;
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
text-align: center;
}

input {
width: 70%;
padding: 10px;
border-radius: 6px;
border: 1px solid #ccc;
}

button {
padding: 10px;
border: none;
background: #43cea2;
color: white;
border-radius: 6px;
cursor: pointer;
}

button:hover {
background: #36b38c;
}

ul {
list-style: none;
padding: 0;
margin-top: 20px;
}

li {
background: #f4f4f4;
padding: 10px;
margin-top: 8px;
display: flex;
justify-content: space-between;
border-radius: 6px;
}

.delete {
background: red;
color: white;
border: none;
padding: 5px 8px;
border-radius: 4px;
cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h1>To-Do List</h1>

<input id="taskInput" placeholder="Enter a task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>
function addTask() {
const input = document.getElementById("taskInput");
const taskText = input.value;

if(taskText === "") return;

const li = document.createElement("li");

li.innerHTML = `
${taskText}
<button class="delete" onclick="deleteTask(this)">X</button>
`;

document.getElementById("taskList").appendChild(li);

input.value = "";
}

function deleteTask(button) {
button.parentElement.remove();
}
</script>

</body>
</html>
